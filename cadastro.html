<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Agenda Médica</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="login-container">
        <form id="cadastro-form" class="login-form cadastro-form" novalidate>
            
            <div class="login-logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19Z" fill="currentColor"/>
                    <path d="M7 12H11V7H13V12H17V14H13V19H11V14H7V12Z" fill="currentColor"/>
                </svg>
                <span>Agenda Médica</span>
            </div>

            <h2>Criar Conta</h2>
            <p class="form-subtitle">Preencha os dados abaixo para criar sua conta</p>

            <div class="form-row-cadastro">
                <div class="form-group">
                    <label for="nomeCompleto">Nome Completo *</label>
                    <input type="text" id="nomeCompleto" name="nomeCompleto" required minlength="3" maxlength="100" placeholder="Seu nome completo">
                    <span class="error-message" role="alert"></span>
                </div>
            </div>

            <div class="form-row-cadastro">
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                    <span class="error-message" role="alert"></span>
                </div>
            </div>

            <div class="form-row-cadastro">
                <div class="form-group">
                    <label for="telefone">Telefone *</label>
                    <input type="tel" id="telefone" name="telefone" required pattern="[\d\s\(\)\-\+]+" minlength="10" maxlength="20" placeholder="(11) 98765-4321">
                    <span class="error-message" role="alert"></span>
                </div>
            </div>

            <div class="form-row-cadastro">
                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" name="cpf" required minlength="11" maxlength="14" placeholder="000.000.000-00">
                    <span class="error-message" role="alert"></span>
                </div>
            </div>

            <div class="form-row-cadastro">
                <div class="form-group">
                    <label for="senha">Senha *</label>
                    <div class="input-with-toggle">
                        <input type="password" id="senha" name="senha" required minlength="6" maxlength="50" placeholder="Mínimo 6 caracteres">
                        <button type="button" class="toggle-password" aria-label="Mostrar senha" data-target="senha">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-message" role="alert"></span>
                </div>
            </div>

            <div class="form-row-cadastro">
                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Senha *</label>
                    <div class="input-with-toggle">
                        <input type="password" id="confirmarSenha" name="confirmarSenha" required minlength="6" maxlength="50" placeholder="Repita a senha">
                        <button type="button" class="toggle-password" aria-label="Mostrar confirmação de senha" data-target="confirmarSenha">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                    <span class="error-message" role="alert"></span>
                </div>
            </div>

            <div class="password-strength-container" id="passwordStrength" style="display:none;">
                <div class="strength-label">Força da senha: <span id="strengthText">Fraca</span></div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
            </div>

            <p>Já tem uma conta? <a href="index.html">Fazer login</a></p>

            <button type="submit" class="btn-cadastro">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="currentColor"/>
                </svg>
                Criar Conta
            </button>

            <p id="cadastro-message"></p> 

            <div class="form-footer-links">
            </div>
        </form>
    </div>
    
    <script src="cadastro.js"></script>
</body>
</html>
